name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ApplicationTracker.sln

      - name: Build
        run: dotnet build ApplicationTracker.sln -c Release --no-restore

      - name: Ensure testhost.deps.json exists (CI workaround)
        run: |
          set -e
          for deps in $(find . -path "*/ApplicationTracker.Tests/bin/Release/net8.0/ApplicationTracker.Tests.deps.json"); do
            dir=$(dirname "$deps")
            if [ ! -f "$dir/testhost.deps.json" ]; then
              echo "Creating $dir/testhost.deps.json"
              cp "$deps" "$dir/testhost.deps.json"
            fi
          done

      - name: Test
        run: dotnet test ApplicationTracker.sln -c Release --no-build --no-restore

  deploy-to-render:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: curl -X POST "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}