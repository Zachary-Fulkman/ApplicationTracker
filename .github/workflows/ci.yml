name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Diagnostic - list test output
        run: |
          echo "=== repo root ==="
          ls -la
          echo "=== find deps files ==="
          find . -maxdepth 6 -name "*deps.json" -print
          echo "=== list test bin Release ==="
          ls -la ApplicationTracker.Tests/bin/Release/net8.0 || true
          echo "=== list test bin Debug ==="
          ls -la ApplicationTracker.Tests/bin/Debug/net8.0 || true

      - name: Test
        run: dotnet test ApplicationTracker.sln -c Release --no-restore